# Redbag 配置文件
# 颜色代码使用 Bukkit 的 & 颜色符号，例如 &a 绿色、&c 红色、&e 黄色、&7 灰色。
# 修改后可以使用 /redbag reload 重载配置；如果重载后仍异常，建议重启服务器确认。

# 红包基础规则
settings:
  # 单个红包允许的最小总金额。
  min-total: 1.0
  # 单个红包允许的最大总金额。
  max-total: 1000000.0
  # 单个红包允许的最少份数。
  min-count: 1
  # 单个红包允许的最多份数。
  max-count: 100
  # 红包有效期，单位：分钟。过期后未领取的余额会退回给发送者。
  expire-minutes: 10
  # 是否向全服广播新红包。
  broadcast-created: true
  # 是否向全服广播领取记录。
  broadcast-claimed: true
  # 红包领完后是否广播手气王。
  broadcast-lucky-king: true
  # true 为随机金额，false 为尽量平均金额。
  random-amounts: true
  # 手速红包的速度加成倍数。数值越高，越早领取越容易拿到更高金额。
  drop-speed-bonus-multiplier: 1.5
  # 玩家执行 /redbag send 后选择领取物品的等待时间，单位：秒。
  gui-pending-seconds: 60
  # 口令最大长度，超过会拒绝创建口令红包。
  max-passphrase-length: 16

# 手速红包的物品选择界面
drop-gui:
  # GUI 标题。
  title: '&c选择红包领取物品'
  # GUI 大小，必须是 9 的倍数，插件会自动修正到 9-54 之间。
  size: 27
  # GUI 中每个可选物品的显示名。可用变量：{item}
  item-name: '&e{item}'
  # GUI 中每个可选物品的说明。可用变量：{item} {total} {count}
  item-lore:
    - '&7点击选择这个物品作为领取方式'
    - '&7总金额: &e{total}'
    - '&7份数: &e{count}'

# 手速红包可选择的领取物品
# material 必须填写 Bukkit 材料名；name 是玩家看到的中文名；slot 是 GUI 格子位置，从 0 开始。
drop-items:
  DIRT:
    material: DIRT
    name: '泥土'
    slot: 1
  DIAMOND_BLOCK:
    material: DIAMOND_BLOCK
    name: '钻石块'
    slot: 3
  WATER_BUCKET:
    material: WATER_BUCKET
    name: '水桶'
    slot: 5
  RED_MUSHROOM:
    material: RED_MUSHROOM
    name: '红蘑菇'
    slot: 7
  APPLE:
    material: APPLE
    name: '苹果'
    slot: 10
  GOLD_INGOT:
    material: GOLD_INGOT
    name: '金锭'
    slot: 12
  EMERALD:
    material: EMERALD
    name: '绿宝石'
    slot: 14
  TORCH:
    material: TORCH
    name: '火把'
    slot: 16
  BREAD:
    material: BREAD
    name: '面包'
    slot: 21
  PAPER:
    material: PAPER
    name: '纸'
    slot: 23

# 消息文本
# 常用变量：
# {id}=红包编号，{player}=发送者，{claimer}=领取者，{total}=总金额，{amount}=本次金额
# {count}=总份数，{remaining-count}=剩余份数，{remaining}=剩余金额
# {message}=祝福语，{expire}=有效期分钟，{passphrase}=口令，{claim-item}=领取物品显示名
messages:
  # 所有插件消息的统一前缀。
  prefix: '&c[红包]&r '
  no-permission: '&c你没有权限。'
  player-only: '&c只有玩家可以使用这个命令。'
  economy-missing: '&c未找到 Vault 经济服务，红包功能暂不可用。'
  invalid-number: '&c请输入有效数字。'
  invalid-usage: '&e用法: /redbag send <总金额> <份数> [祝福语]'
  invalid-code-usage: '&e用法: /redbag code <总金额> <份数> <口令> [祝福语]'
  invalid-passphrase: '&c口令太长，请换一个更短的口令。'
  duplicate-passphrase: '&c当前已有可领取的同口令红包，请换一个口令后再发送。'
  active-drop-redbag-exists: '&c你已经有一个手速红包还没结束，领完或过期后才能再发新的手速红包。'
  active-code-redbag-exists: '&c你已经有一个口令红包还没结束，领完或过期后才能再发新的口令红包。'
  choose-drop-item: '&a请选择一种领取物品，选定后红包才会发出。'
  gui-expired: '&c选择物品超时，本次红包未发出，请重新发送。'
  created: '&a你发出了红包 &e#{id}&a，总金额 &e{total}&a，份数 &e{count}&a。'
  created-code: '&a你发出了口令红包 &e#{id}&a，总金额 &e{total}&a，份数 &e{count}&a，口令 &d{passphrase}&a。'
  created-broadcast: '&e{player}&a 发出了手速红包 &e#{id}&a，祝福语: &f{message} &7手持 &e{claim-item}&7 左键即可领取，越快越容易拿到更高金额。&8（有效期 {expire} 分钟）'
  created-code-broadcast: '&e{player}&a 发出了口令红包 &e#{id}&a，祝福语: &f{message} &7在聊天栏发送 &d{passphrase}&7 即可领取。&8（有效期 {expire} 分钟）'
  title-main: '&c&l红包来了！'
  title-subtitle: '&f祝福语：{message}'
  title-code-main: '&d&l口令红包来了！'
  title-code-subtitle: '&f发送口令 {passphrase} 领取｜祝福语：{message}'
  grabbed: '&a你领取了红包 &e#{id}&a，获得 &e{amount}&a。'
  drop-created-tip: '&a手速红包已发出，玩家手持 &e{claim-item}&a 左键即可领取。有效期 &e{expire}&a 分钟。'
  claimed-broadcast: '&e{claimer}&a 领取了 &e{player}&a 的红包 &e#{id}&a，还剩 &e{remaining-count}&a 份。'
  drop-required: '&c这个红包需要手持指定物品左键领取。'
  no-item-redbag: '&c当前没有可用这个物品领取的红包。'
  wrong-passphrase: '&c口令错误，领取失败。'
  ambiguous-passphrase: '&c有多个红包使用了这个口令，请点击对应红包消息领取。'
  already-grabbed: '&c你已经领取过这个红包了。'
  not-found: '&c红包不存在。'
  closed: '&c这个红包已经领完或过期。'
  insufficient-money: '&c余额不足，需要 &e{total}&c。'
  list-empty: '&7当前没有可领取的红包。'
  lucky-king-broadcast: '&6红包 &e#{id}&6 已抢完，手气王是 &e{player}&6，抢到 &e{amount}&6！'
  expired-refund: '&e红包 &a#{id}&e 已过期，剩余 &a{remaining-count}&e 份未领取，已退回 &a{amount}&e 到你的余额。'
  reloaded: '&aRedbag 已重载。'
