    name: '水桶'
    slot: 5
  RED_MUSHROOM:
    material: RED_MUSHROOM
    name: '红蘑菇'
    slot: 7
  APPLE:
    material: APPLE
    name: '苹果'
    slot: 10
  GOLD_INGOT:
    material: GOLD_INGOT
    name: '金锭'
    slot: 12
